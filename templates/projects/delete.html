{% extends "base.html" %}
{% block content %}
<section class="section">
  <div class="container">
    <h1 class="section-title">Eliminar Proyecto</h1>
    <p>¿Estás seguro de que deseas eliminar el proyecto <strong>{{ project.title }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <button class="btn-danger" type="submit">Eliminar</button>
      <a href="{% url 'dashboard' %}" class="btn-secondary">Cancelar</a>
    </form>
  </div>
</section>
{% endblock %}
